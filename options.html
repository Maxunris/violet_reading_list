<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="optionsTitle">Violet Reading List Backup</title>
    <link rel="stylesheet" href="styles/options.css">
  </head>
  <body>
    <main class="options-shell">
      <section class="hero">
        <p class="eyebrow" data-i18n="optionsEyebrow">Backup and transport</p>
        <h1 data-i18n="appTitle">Violet Reading List</h1>
        <p data-i18n="optionsIntro">Export your library, import a backup, and check which storage area is active.</p>
      </section>

      <section class="card-grid">
        <article class="card">
          <h2 data-i18n="optionsExportTitle">Export</h2>
          <p data-i18n="optionsExportCopy">Download the full library as JSON.</p>
          <button id="export-library" class="primary-action" type="button" data-i18n="optionsExportButton">Export library</button>
        </article>

        <article class="card">
          <h2 data-i18n="optionsImportTitle">Import</h2>
          <p data-i18n="optionsImportCopy">Bring back a previous backup.</p>
          <label class="inline-select">
            <span data-i18n="optionsImportMode">Mode</span>
            <select id="import-mode">
              <option value="merge" data-i18n="optionsImportMerge">Merge into current library</option>
              <option value="replace" data-i18n="optionsImportReplace">Replace current library</option>
            </select>
          </label>
          <input id="import-file" type="file" accept="application/json">
          <button id="import-library" class="secondary-action" type="button" data-i18n="optionsImportButton">Import file</button>
        </article>

        <article class="card">
          <h2 data-i18n="optionsStorageTitle">Storage</h2>
          <p id="storage-status" data-i18n="optionsStorageChecking">Checking storage area…</p>
          <button id="refresh-storage" class="ghost-action" type="button" data-i18n="optionsRefreshStorage">Refresh</button>
        </article>
      </section>

      <p id="status-message" class="status-message" aria-live="polite"></p>
    </main>
    <script type="module" src="scripts/options.js"></script>
  </body>
</html>
